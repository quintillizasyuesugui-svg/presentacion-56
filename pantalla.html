<!DOCTYPE html>
<html>
<head>
  <title>Pantalla</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone-frame">
  <div class="content">
    <!-- Title removed per feedback -->
    <img id="img" src="">
    <div id="slideCounter" style="margin-top:0.5rem; font-size:1.2rem; font-weight:bold; color:#00f5ff; text-shadow:0 0 10px #00f5ff;">0 / 0</div>
<!-- Gracias removed per feedback -->
    <p id="fullscreenHint" style="margin-top:1rem; color:#444;">Presiona el botón para ir a pantalla completa (necesario en algunos navegadores).</p>
    <button id="enterFullscreen" style="margin-top:0.5rem;">📺 Ir a pantalla completa</button>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

let diapositivas = [];
  let index = 0;

  // Load images dynamically
  fetch('/images')
    .then(res => res.json())
    .then(images => {
      diapositivas = images;
      updateCounter();
    })
    .catch(err => console.error('Error loading images:', err));

function updateCounter() {
  const counter = document.getElementById('slideCounter');
  if (counter) {
    counter.textContent = index + ' / ' + diapositivas.length;
  }
}

const fullscreenButton = document.getElementById('enterFullscreen');
const fullscreenHint = document.getElementById('fullscreenHint');

function requestFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) {
    el.requestFullscreen();
  } else if (el.webkitRequestFullscreen) {
    el.webkitRequestFullscreen();
  } else if (el.mozRequestFullScreen) {
    el.mozRequestFullScreen();
  } else if (el.msRequestFullscreen) {
    el.msRequestFullscreen();
  }
}

fullscreenButton.addEventListener('click', () => {
  requestFullscreen();
  fullscreenButton.style.display = 'none';
  fullscreenHint.textContent = 'Pantalla completa activada';
});

document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement) {
    fullscreenButton.style.display = 'none';
    fullscreenHint.textContent = 'Modo pantalla completa (ESC para salir)';
  } else {
    fullscreenButton.style.display = 'inline-block';
    fullscreenHint.textContent = 'Presiona el botón para ir a pantalla completa';
  }
});

socket.on("cine", () => {
  // Intentar fullscreen directamente (a veces falla por falta de gesto usuario desde otra ventana)
  requestFullscreen();

  // Mostrar botón de fallback para que el usuario confirme en esta pestaña
  fullscreenButton.style.display = 'inline-block';
  fullscreenHint.textContent = 'Se solicitó pantalla completa desde control. Toca el botón si no se activó.';
});

socket.on("cambiar", (accion) => {
    const img = document.getElementById("img");



    if (accion === "mostrar") {
      index = 0;
      updateCounter();
      img.classList.remove('show');
      img.onload = () => img.classList.add('show');
      img.src = diapositivas[index];
      return;
    }

    if (accion === "siguiente") {
      index++;
      if (index >= diapositivas.length) index = 0;
    }

    if (accion === "anterior") {
      index--;
      if (index < 0) {
        index = diapositivas.length - 1;
      }
    }

    updateCounter();

    // Fade anim para siguiente/anterior/mostrar/números
    img.classList.remove('show');
    img.onload = () => {
      img.classList.add('show');
      if (index === diapositivas.length - 1) {
        confetti();
      }
    };
    img.src = diapositivas[index];
  });

function confetti() {
  // Simple confetti canvas
  const canvas = document.createElement('canvas');
  canvas.style.position = 'fixed';
  canvas.style.top = '0';
  canvas.style.left = '0';
  canvas.style.pointerEvents = 'none';
  canvas.style.zIndex = '10000';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const pieces = [];
  const colors = ['#ff00ff', '#00f5ff', '#ffd700', '#98FB98', '#ff6b6b', '#4ecdc4'];
  for (let i = 0; i < 150; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      vx: Math.random() * 10 - 5,
      vy: Math.random() * 3 + 2,
      size: Math.random() * 8 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360,
      vr: Math.random() * 10 - 5
    });
  }
  let animationId;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.y += p.vy;
      p.x += p.vx;
      p.rotation += p.vr;
      if (p.y > canvas.height) {
        p.y = -p.size;
        p.x = Math.random() * canvas.width;
      }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      ctx.restore();
    });
    animationId = requestAnimationFrame(animate);
  }
  animate();
  setTimeout(() => {
    cancelAnimationFrame(animationId);
    document.body.removeChild(canvas);
  }, 3000);
}

// Salir de pantalla completa con ESC
window.addEventListener('keydown', (event) => {
  if (event.key === 'Escape' || event.key === 'Esc') {
    if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement) {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      } else if (document.mozCancelFullScreen) {
        document.mozCancelFullScreen();
      } else if (document.msExitFullscreen) {
        document.msExitFullscreen();
      }
    }
  }
});

// Imagen solo aparece al presionar "Mostrar" desde control (pantalla negra inicial)


</script>

</body>
</html>
